<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ฟอร์มคีย์ข้อมูลการจัดรถ</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0047AB, #4169E1);
    }
    .box {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      text-align: center;
      max-width: 380px;
      width: 90%;
    }
    h1 {
      font-size: 20px;
      color: #0047AB;
      margin: 0 0 10px;
    }
    p {
      font-size: 14px;
      color: #555;
      margin: 0 0 20px;
    }
    a.btn {
      display: inline-block;
      background: linear-gradient(90deg, #0047AB, #4169E1);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      transition: transform 0.2s ease;
    }
    a.btn:hover { transform: translateY(-2px); }
    .spinner {
      margin: 0 auto 15px;
      width: 34px;
      height: 34px;
      border: 4px solid #e0e0e0;
      border-top-color: #0047AB;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>ฟอร์มคีย์ข้อมูลการจัดรถ</h1>
    <p>กำลังพาไปยังหน้าฟอร์ม...<br>ถ้าไม่เปลี่ยนหน้าอัตโนมัติ กดปุ่มด้านล่างได้เลย</p>
    <a class="btn" id="goBtn" href="https://script.google.com/macros/s/AKfycbyIFbu9PR5DQrL6VRjOGSywjSOKuirPQQB9mI8G_Y_6UR6hrloJCP2KKvmuUG5lNcf5xA/exec">
      เปิดฟอร์ม
    </a>
  </div>

  <script>
    // เปลี่ยนหน้าอัตโนมัติไปยังฟอร์ม (แทนที่จะฝัง iframe ซึ่งโดน Google บล็อก)
    var target = document.getElementById('goBtn').href;
    setTimeout(function () {
      window.location.href = target;
    }, 800);
  </script>
</body>
</html>
